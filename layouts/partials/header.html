<header class="dark:bg-stone-600 bg-neutral-300 border-b-[0.3rem] border-black font-bangers text-2xl">
    <div class="flex items-center m-auto w-5/6 md:w-3/5 flex-wrap">
        <a href="{{ .Site.Home.RelPermalink }}" class="font-MajorMonoDisplay">
            <h1 class="text-3xl md:text-4xl md:font-black">{{ site.Params.sitename | default "amirany.ir" }}</h1>
        </a>

        <nav class="hidden md:flex space-x-[2rem] bg-sky-50 dark:bg-slate-950 px-2 my-1 rounded-md items-center ml-auto">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL }}" class="dark:hover:text-stone-400 hover:text-neutral-600 text-neutral-950 dark:text-amber-100 transition-colors duration-300">
                {{ .Name }}
            </a>
            {{ end }}
        </nav>
        <button id="theme-toggle-button" data-theme-toggle
                type="button"
                aria-label="Toggle dark mode"
                aria-pressed="false"
                class="p-2 rounded-md hover:bg-stone-400 transition-colors mr-2"
                title="Toggle theme">
            <svg data-icon="moon" class="w-6 h-6 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
            <svg data-icon="sun" class="w-6 h-6 hidden dark:block text-amber-200" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
        </button>
        
        <button id="mobile-menu-button" class="md:hidden text-black focus:outline-none ml-auto" aria-label="Toggle menu">
            <svg class="w-[2.5rem] h-[2.5rem]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </div>

    <!-- Mobile Navigation -->
    <nav id="mobile-menu" class="hidden md:hidden fixed inset-0 bg-stone-700 z-50">
        <div class="flex flex-col items-center justify-center h-full space-y-8">
            <button id="close-menu-button" class="absolute top-4 right-4 text-white focus:outline-none" aria-label="Close menu">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            {{ range .Site.Menus.main }}
            <a href="{{ .URL }}" class="text-stone-400 text-4xl no-underline hover:text-amber-400 transition-colors duration-300">
                {{ .Name }}
            </a>
            {{ end }}

            <button data-theme-toggle
                    type="button"
                    aria-label="Toggle dark mode"
                    class="p-3 rounded-md hover:bg-stone-600 transition-colors text-amber-200"
                    title="Toggle theme">
                <svg data-icon="moon" class="w-8 h-8 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
                <svg data-icon="sun" class="w-8 h-8 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
            </button>
            <div class="flex-col space-y-2">
                {{ partial "social-links.html" . }}
            </div>
        </div>
    </nav>
</header>
